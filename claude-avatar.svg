<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#a85f45"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Anthropic-style mark: central diamond/star shape -->
  <g fill="white" opacity="0.95">
    <!-- top bar -->
    <rect x="38" y="22" width="24" height="8" rx="4"/>
    <!-- left bar -->
    <rect x="22" y="38" width="8" height="24" rx="4"/>
    <!-- right bar -->
    <rect x="70" y="38" width="8" height="24" rx="4"/>
    <!-- bottom bar -->
    <rect x="38" y="70" width="24" height="8" rx="4"/>
    <!-- center -->
    <rect x="38" y="38" width="24" height="24" rx="4"/>
  </g>
</svg>
